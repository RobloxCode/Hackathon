<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Tesoros de Morelia</title>
    <style>
        :root { 
            --rojo-vino: #7F2020; 
            --verde-salvia: #869B7E; 
            --oliva-claro: #C9CAAC; 
            --hueso: #F6F3EB; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--hueso); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .auth-box { 
            background: white; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(127,32,32,0.15); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
        }
        h2 { color: var(--rojo-vino); margin-bottom: 5px; }
        p { color: var(--verde-salvia); font-size: 14px; margin-top: 0; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
        }
        .btn-primario { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--rojo-vino); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        .toggle-link { 
            color: var(--verde-salvia); 
            cursor: pointer; 
            font-size: 13px; 
            display: block; 
            margin-top: 15px; 
            text-decoration: underline; 
        }
        #msgStatus { margin-top: 15px; font-size: 14px; font-weight: bold; }
        .error { color: #d9534f; }
        .success { color: #5cb85c; }

        /* Sección de Contacto */
        .contact-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #777;
            line-height: 1.5;
        }
        .contact-info a { color: var(--rojo-vino); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2 id="authTitle">Iniciar Sesión</h2>
        <p id="authDesc">Panel de Acceso</p>

        <form id="authForm">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            
            <div id="registroExtra" style="display:none;">
                <input type="text" id="nombre" placeholder="Nombre completo">
                </div>

            <button type="submit" class="btn-primario" id="btnAccion">Entrar</button>
        </form>

        <span class="toggle-link" id="toggleAuth">¿No tienes cuenta? Regístrate aquí</span>
        
        <div id="msgStatus"></div>

        <div class="contact-info">
            ¿Eres un negocio local y quieres unirte?<br>
            <b>Contáctanos:</b> <a href="mailto:soporte@tesorosmorelia.com">soporte@tesorosmorelia.com</a><br>
            <b>WhatsApp:</b> +52 443 123 4567
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqpIaJI-C_96hQnV4ji1XypPpC85w25BI",
            authDomain: "hackathon-c1121.firebaseapp.com",
            projectId: "hackathon-c1121",
            storageBucket: "hackathon-c1121.firebasestorage.app",
            messagingSenderId: "794762493985",
            appId: "1:794762493985:web:6f3c9dfef332f1f34ea360",
            measurementId: "G-DGSZRMG33B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

            const VENDEDOR_MAP = {
                "gaspachosboulevard@mgmail.com": "vendedor_NEG_01.html",
                "cafedelasrosas@gmail.com": "vendedor_NEG_02.html",
                "artesaniasdonvasco@gmail.com": "vendedor_NEG_03.html",
                "tacosElguero@gmail.com": "vendedor_NEG_04.html",
                "correo_del_negocio_5@morelia.com": "vendedor_NEG_05.html",
                "correo_del_negocio_6@morelia.com": "vendedor_NEG_06.html"
            };

            const authForm = document.getElementById('authForm');
            const toggleAuth = document.getElementById('toggleAuth');
            const registroExtra = document.getElementById('registroExtra');
            const authTitle = document.getElementById('authTitle');
            const btnAccion = document.getElementById('btnAccion');
            const msgStatus = document.getElementById('msgStatus');

            let modoRegistro = false;

            toggleAuth.addEventListener('click', () => {
                modoRegistro = !modoRegistro;
                authTitle.innerText = modoRegistro ? 'Crear Cuenta de Turista' : 'Iniciar Sesión';
                btnAccion.innerText = modoRegistro ? 'Registrarse' : 'Entrar';
                registroExtra.style.display = modoRegistro ? 'block' : 'none';
                toggleAuth.innerText = modoRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate aquí';
            });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            msgStatus.innerText = 'Cargando...';
            msgStatus.className = '';

            try {
                if (modoRegistro) {
                    const nombre = document.getElementById('nombre').value;
                    
                    // Se fuerza el rol a turista para todo el que se registre desde aquí
                    const rol = 'turista'; 
                    
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "usuarios", cred.user.uid), {
                        nombre: nombre,
                        email: email,
                        rol: rol,
                        fecha: new Date().toISOString()
                    });
                    
                    mostrarMsg('Registro exitoso. Redirigiendo...', 'success');
                    redirigir(rol, email);
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, password);
                    const snap = await getDoc(doc(db, "usuarios", cred.user.uid));
                    
                    if (snap.exists()) {
                        const userDat = snap.data();
                        mostrarMsg('Acceso correcto.', 'success');
                        redirigir(userDat.rol, email);
                    } else {
                        mostrarMsg('Error: No hay datos de perfil.', 'error');
                    }
                }
            } catch (err) {
                console.error(err);
                let txtErr = "Error al intentar entrar.";
                if (err.code === 'auth/invalid-credential') txtErr = "Usuario o contraseña incorrectos.";
                if (err.code === 'auth/email-already-in-use') txtErr = "Este correo ya está en uso.";
                mostrarMsg(txtErr, 'error');
            }
        });

        function redirigir(rol, email) {
    setTimeout(() => {
        if (rol === 'admin') {
            // Busca el correo en el VENDEDOR_MAP
            const destino = VENDEDOR_MAP[email];
            
            if (destino) {
                // Si lo encuentra, lo manda a su html correspondiente
                window.location.href = destino;
            } else {
                // Si el correo NO está en la lista de arriba, muestra un error claro
                mostrarMsg(`Error: El correo ${email} no está configurado en el mapa.`, 'error');
            }
        } else {
            // Los turistas van directo a la app
            window.location.href = 'app.html';
        }
    }, 1000);
}

        function mostrarMsg(texto, tipo) {
            msgStatus.innerText = texto;
            msgStatus.className = tipo;
        }
    </script>
</body>
</html>
