<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Red Local Morelia</title>
    <style>
        /* NUEVA PALETA DE COLORES */
        :root {
            --rojo-vino: #7F2020;
            --verde-salvia: #869B7E;
            --oliva-claro: #C9CAAC;
            --hueso: #F6F3EB;
            --texto-oscuro: #2c3e50;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--hueso); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 8px 25px rgba(127, 32, 32, 0.15); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: var(--rojo-vino); margin-bottom: 5px; }
        p { color: var(--verde-salvia); font-size: 14px; margin-top: 0; }
        
        input, select { width: calc(100% - 24px); padding: 12px; margin: 10px 0; border: 2px solid var(--oliva-claro); border-radius: 6px; font-size: 14px; background-color: #fafafa; outline: none; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: var(--verde-salvia); }
        
        .btn { background-color: var(--rojo-vino); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold; transition: background-color 0.3s; }
        .btn:hover { background-color: #5c1616; }
        
        .btn-outline { background-color: transparent; color: var(--rojo-vino); border: 2px solid var(--rojo-vino); margin-top: 15px; }
        .btn-outline:hover { background-color: var(--rojo-vino); color: white; }
        
        .error, .success { display: none; font-size: 14px; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 6px; }
        .error { color: #c0392b; background-color: #fadbd8; }
        .success { color: #27ae60; background-color: #d5f5e3; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2 id="titulo-form">Iniciar Sesión</h2>
        <p id="subtitulo-form">Ingresa con tu correo y contraseña.</p>
        
        <input type="email" id="correo" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        
        <select id="rol-registro" class="hidden">
            <option value="turista">Soy Turista / Comprador</option>
            <option value="admin">Soy Dueño de Negocio</option>
        </select>

        <button id="btn-accion" class="btn">Entrar</button>
        
        <p id="msg-status"></p>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="btn-toggle" class="btn btn-outline">¿No tienes cuenta? Regístrate</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Tus llaves reales del proyecto Hackathon
        const firebaseConfig = {
            apiKey: "AIzaSyAqpIaJI-C_96hQnV4ji1XypPpC85w25BI",
            authDomain: "hackathon-c1121.firebaseapp.com",
            projectId: "hackathon-c1121",
            storageBucket: "hackathon-c1121.firebasestorage.app",
            messagingSenderId: "794762493985",
            appId: "1:794762493985:web:6f3c9dfef332f1f34ea360",
            measurementId: "G-DGSZRMG33B"
        };

        // Inicializar la aplicación, autenticación y base de datos
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let modoActual = 'login';
        
        const titulo = document.getElementById('titulo-form');
        const subtitulo = document.getElementById('subtitulo-form');
        const selectorRol = document.getElementById('rol-registro');
        const btnAccion = document.getElementById('btn-accion');
        const btnToggle = document.getElementById('btn-toggle');
        const msgStatus = document.getElementById('msg-status');

        // Alternar entre Iniciar Sesión y Crear Cuenta
        btnToggle.addEventListener('click', () => {
            msgStatus.style.display = 'none';
            if (modoActual === 'login') {
                modoActual = 'registro';
                titulo.innerText = 'Crear Cuenta';
                subtitulo.innerText = 'Únete para obtener o crear promociones.';
                selectorRol.classList.remove('hidden');
                btnAccion.innerText = 'Registrarme';
                btnToggle.innerText = '¿Ya tienes cuenta? Inicia sesión';
            } else {
                modoActual = 'login';
                titulo.innerText = 'Iniciar Sesión';
                subtitulo.innerText = 'Ingresa con tu correo y contraseña.';
                selectorRol.classList.add('hidden');
                btnAccion.innerText = 'Entrar';
                btnToggle.innerText = '¿No tienes cuenta? Regístrate';
            }
        });

        // Procesar el formulario (Registro o Login)
        btnAccion.addEventListener('click', async () => {
            const email = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                mostrarMensaje('Llena todos los campos', 'error');
                return;
            }

            try {
                if (modoActual === 'registro') {
                    // 1. Crear el usuario en Firebase Authentication
                    const rol = document.getElementById('rol-registro').value;
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Guardar su rol en la base de datos Firestore
                    await setDoc(doc(db, "usuarios", user.uid), {
                        correo: email,
                        rol: rol
                    });

                    mostrarMensaje('¡Registro exitoso!', 'success');
                    redirigir(rol);

                } else {
                    // 1. Iniciar sesión
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Leer su rol desde la base de datos para saber a dónde mandarlo
                    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (docSnap.exists()) {
                        const datosUsuario = docSnap.data();
                        mostrarMensaje('Entrando...', 'success');
                        redirigir(datosUsuario.rol);
                    } else {
                        mostrarMensaje('Error: No se encontró el rol del usuario.', 'error');
                    }
                }
            } catch (error) {
                // Manejo de errores comunes para que se vea bien en pantalla
                let mensajeError = error.message;
                if (error.code === 'auth/email-already-in-use') mensajeError = 'Este correo ya está registrado.';
                if (error.code === 'auth/weak-password') mensajeError = 'La contraseña debe tener al menos 6 caracteres.';
                if (error.code === 'auth/invalid-credential') mensajeError = 'Correo o contraseña incorrectos.';
                
                mostrarMensaje(mensajeError, 'error');
            }
        });

        // Redirigir a la pantalla correspondiente
        function redirigir(rol) {
            // Guardamos temporalmente el rol en el navegador para validarlo en las otras páginas
            localStorage.setItem('sesionActiva', rol);
            
            setTimeout(() => {
                window.location.href = rol === 'admin' ? 'admin.html' : 'app.html';
            }, 1500); // 1.5 segundos de pausa para que lea el mensaje de éxito
        }

        function mostrarMensaje(texto, tipo) {
            msgStatus.innerText = texto;
            msgStatus.className = tipo;
            msgStatus.style.display = 'block';
        }
    </script>
</body>
</html>
