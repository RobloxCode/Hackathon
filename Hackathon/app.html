<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesoros de Morelia - App Cliente</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --rojo-vino: #7F2020;
            --verde-salvia: #869B7E;
            --oliva-claro: #C9CAAC;
            --hueso: #F6F3EB;
            --texto-oscuro: #2c3e50;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--hueso); color: var(--texto-oscuro); padding-bottom: 70px; }

        /* ENCABEZADO */
        .header {
            background-color: var(--rojo-vino); padding: 25px; text-align: center; color: white;
            border-bottom: 6px solid var(--verde-salvia); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header h1 { margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .header p  { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }

        /* VISTAS */
        .vista { display: none; animation: fadeIn 0.3s; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* MAPA */
        #mapa-container { height: 300px; width: 100%; border-bottom: 4px solid var(--oliva-claro); z-index: 1; }

        /* FILTROS */
        .filtros {
            display: flex; justify-content: center; gap: 8px;
            padding: 14px 12px; background: white;
            position: sticky; top: 0; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06); flex-wrap: wrap;
        }
        .btn-filtro {
            background: white; border: 2px solid var(--oliva-claro);
            padding: 7px 16px; border-radius: 20px; cursor: pointer;
            color: var(--verde-salvia); font-weight: bold; font-size: 13px; transition: 0.25s;
        }
        .btn-filtro.active { background: var(--rojo-vino); color: white; border-color: var(--rojo-vino); }

        /* GRID */
        .masonry-grid { columns: 3; column-gap: 20px; padding: 25px; max-width: 1200px; margin: 0 auto; }
        .card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            display: inline-block; width: 100%; margin-bottom: 20px;
            break-inside: avoid; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(127,32,32,0.15); }
        .card.oculta { display: none; }
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-content { padding: 18px; }
        .card-content h3 { margin: 0; font-size: 19px; color: var(--rojo-vino); }
        .categoria-label { font-size: 12px; color: var(--verde-salvia); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .promo-tag { background-color: var(--oliva-claro); color: var(--rojo-vino); padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; margin: 12px 0; display: inline-block; }
        .card-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .btn-mapa  { background-color: var(--verde-salvia); color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-claim { background-color: var(--rojo-vino); color: white; }

        /* HISTORIAL */
        .historial-container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .historial-container h2 { color: var(--rojo-vino); margin-bottom: 4px; }
        .historial-container > p { color: var(--verde-salvia); font-size: 14px; margin: 0 0 18px; }

        .visita-item {
            background: white; border: 2px solid var(--oliva-claro);
            border-radius: 12px; padding: 15px; margin-bottom: 14px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }
        .visita-icon { font-size: 30px; background: var(--hueso); padding: 10px; border-radius: 50%; flex-shrink: 0; }
        .visita-info h4 { margin: 0; color: var(--rojo-vino); font-size: 17px; }
        .visita-info p  { margin: 4px 0 0 0; font-size: 13px; color: var(--verde-salvia); }
        .visita-pts { margin-left: auto; font-weight: bold; color: var(--verde-salvia); background: #eef2ec; padding: 5px 12px; border-radius: 20px; font-size: 13px; white-space: nowrap; flex-shrink: 0; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: flex;
            justify-content: space-around; padding: 10px 0; z-index: 100;
            border-top: 2px solid var(--oliva-claro);
        }
        .nav-item {
            background: none; border: none; flex: 1; font-size: 12px;
            color: var(--texto-oscuro); font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s;
        }
        .nav-item.active { color: var(--rojo-vino); }
        .nav-icon { font-size: 24px; }

        /* MODAL CÓDIGO */
        #cupon-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(44,62,80,0.85);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--hueso); padding: 30px; border-radius: 15px;
            text-align: center; max-width: 320px; width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid var(--rojo-vino);
        }
        .modal-content h2 { margin-top: 0; color: var(--rojo-vino); font-size: 24px; }
        .codigo-gigante { font-size: 38px; color: var(--verde-salvia); font-weight: 900; letter-spacing: 8px; margin-bottom: 10px; }
        .btn-close { background-color: var(--texto-oscuro); color: white; width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }

        /* TOAST */
        #toast-app {
            position: fixed; bottom: 82px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--rojo-vino); color: white;
            padding: 10px 22px; border-radius: 24px;
            font-size: 13px; font-weight: bold;
            opacity: 0; transition: all 0.3s; z-index: 9998;
            pointer-events: none; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        #toast-app.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 900px) { .masonry-grid { columns: 2; } }
        @media (max-width: 600px) { .masonry-grid { columns: 1; padding: 15px; } #mapa-container { height: 240px; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tesoros de Morelia</h1>
        <p>Vive la tradición. Consume local.</p>
    </div>

    <!-- VISTA: CATÁLOGO -->
    <div id="vista-catalogo" class="vista activa">
        <div id="mapa-container"></div>
        <div class="filtros">
            <button class="btn-filtro active" onclick="filtrarCategoria('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="filtrarCategoria('Gastronomia', this)">Gastronomía</button>
            <button class="btn-filtro" onclick="filtrarCategoria('Artesanias', this)">Artesanías</button>
            <button class="btn-filtro" onclick="filtrarCategoria('Servicios', this)">Servicios</button>
        </div>
        <div class="masonry-grid" id="catalogo"></div>
    </div>

    <!-- VISTA: HISTORIAL -->
    <div id="vista-visitas" class="vista">
        <div class="historial-container">
            <h2>Mi Historial</h2>
            <p>Lugares que has visitado y promos canjeadas.</p>
            <div id="lista-historial">
                <p style="text-align:center; color:var(--verde-salvia);">Cargando tu historial...</p>
            </div>
        </div>
    </div>

    <!-- NAV -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="cambiarVista('catalogo', this)">
            <span class="nav-icon">&#127978;</span>Explorar
        </button>
        <button class="nav-item" onclick="cambiarVista('visitas', this)">
            <span class="nav-icon">&#128220;</span>Mis Visitas
        </button>
        <button class="nav-item" onclick="cerrarSesion()">
            <span class="nav-icon">&#128682;</span>Salir
        </button>
    </div>

    <!-- MODAL CÓDIGO -->
    <div id="cupon-modal">
        <div class="modal-content">
            <h2>Tu código de compra</h2>
            <p style="color:var(--texto-oscuro);">
                Muéstrale este código al cajero de<br>
                <strong id="modal-negocio" style="color:var(--rojo-vino); font-size:1.2em;"></strong>
            </p>
            <div style="background:white; border-radius:16px; border:2px dashed var(--oliva-claro); padding:28px 20px; margin:20px 0; text-align:center;">
                <p style="font-size:12px; color:var(--verde-salvia); font-weight:bold; margin:0 0 10px 0; text-transform:uppercase; letter-spacing:2px;">Código único</p>
                <div class="codigo-gigante" id="modal-codigo"></div>
                <p style="font-size:11px; color:#aaa; margin:12px 0 0 0;">El cajero tecleará este código en su sistema</p>
            </div>
            <p style="font-size:13px; color:var(--verde-salvia); font-weight:bold; margin:0;">Un solo uso · Válido 30 min</p>
            <button class="btn-close" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast-app"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /* ── DATOS DE NEGOCIOS ──
           categoria sin acento para data-attribute (evita problemas de encoding) */
        var negocios = [
            { id:"NEG_01", nombre:"Gazpachos El Boulevard", cat:"Gastronomia", catLabel:"Gastronomía", promo:"10% de descuento en mediano",  lat:19.7042, lng:-101.1915, img:"https://images.unsplash.com/photo-1519999482648-25049ddd37b1?w=500&q=80", icono:"🍹" },
            { id:"NEG_02", nombre:"Café de las Rosas",      cat:"Gastronomia", catLabel:"Gastronomía", promo:"Café de olla gratis",            lat:19.7055, lng:-101.1940, img:"https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=500&q=80", icono:"☕" },
            { id:"NEG_03", nombre:"Artesanías Don Vasco",   cat:"Artesanias",  catLabel:"Artesanías",  promo:"Llavero artesanal de regalo",   lat:19.7015, lng:-101.1930, img:"https://images.unsplash.com/photo-1606041011872-5965904f40d4?w=500&q=80", icono:"🏺" },
            { id:"NEG_04", nombre:"Tacos El Güero",         cat:"Gastronomia", catLabel:"Gastronomía", promo:"3x2 en tacos de pastor",         lat:19.7065, lng:-101.1890, img:"https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=500&q=80", icono:"🌮" },
            { id:"NEG_05", nombre:"Hotel Virrey de Mendoza",cat:"Servicios",   catLabel:"Servicios",   promo:"15% en tu primera noche",        lat:19.7025, lng:-101.1950, img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500&q=80", icono:"🏨" },
            { id:"NEG_06", nombre:"Museo Casa de Morelos",  cat:"Servicios",   catLabel:"Servicios",   promo:"Entrada 2x1 a estudiantes",      lat:19.7010, lng:-101.1900, img:"https://images.unsplash.com/photo-1582559937958-6933cceac135?w=500&q=80", icono:"🏛️" }
        ];

        /* ── MAPA ── */
        var map = L.map('mapa-container').setView([19.7027, -101.1923], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        /* ── RENDERIZAR CARDS ── */
        var container = document.getElementById('catalogo');

        negocios.forEach(function(n) {
            var marker = L.marker([n.lat, n.lng]).addTo(map);
            marker.bindPopup('<b>' + n.nombre + '</b><br>' + n.promo);

            var card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-cat', n.cat);
            card.innerHTML =
                '<img src="' + n.img + '" alt="' + n.nombre + '" loading="lazy">' +
                '<div class="card-content">' +
                    '<span class="categoria-label">' + n.icono + ' ' + n.catLabel + '</span>' +
                    '<h3>' + n.nombre + '</h3>' +
                    '<div class="promo-tag">' + n.promo + '</div>' +
                    '<div class="card-actions">' +
                        '<a href="https://www.google.com/maps/dir/?api=1&destination=' + n.lat + ',' + n.lng + '" target="_blank" class="btn btn-mapa">&#128506; Ruta</a>' +
                        '<button class="btn btn-claim" onclick="solicitarPromo(\'' + n.id + '\',\'' + n.nombre.replace(/'/g, "\\'") + '\',\'' + n.promo.replace(/'/g, "\\'") + '\',\'' + n.icono + '\')">Canjear</button>' +
                    '</div>' +
                '</div>';
            container.appendChild(card);
        });

        /* ── FILTRO POR CATEGORÍA ── */
        function filtrarCategoria(cat, btn) {
            document.querySelectorAll('.btn-filtro').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            document.querySelectorAll('#catalogo .card').forEach(function(card) {
                if (cat === 'Todos' || card.getAttribute('data-cat') === cat) {
                    card.classList.remove('oculta');
                } else {
                    card.classList.add('oculta');
                }
            });
        }

        /* ── CAMBIAR VISTA ── */
        function cambiarVista(vista, btnElement) {
            document.querySelectorAll('.vista').forEach(function(v) { v.classList.remove('activa'); });
            document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('vista-' + vista).classList.add('activa');
            btnElement.classList.add('active');
            if (vista === 'catalogo') { setTimeout(function() { map.invalidateSize(); }, 100); }
        }

        /* ── CERRAR MODAL ── */
        function cerrarModal() {
            document.getElementById('cupon-modal').style.display = 'none';
        }

        /* ── TOAST ── */
        function mostrarToast(msg) {
            var t = document.getElementById('toast-app');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2800);
        }
    </script>

    <!-- FIREBASE (módulo ES) -->
    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut }
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs,
                 orderBy, getDoc, doc, setDoc, addDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyAqpIaJI-C_96hQnV4ji1XypPpC85w25BI",
            authDomain:        "hackathon-c1121.firebaseapp.com",
            projectId:         "hackathon-c1121",
            storageBucket:     "hackathon-c1121.firebasestorage.app",
            messagingSenderId: "794762493985",
            appId:             "1:794762493985:web:6f3c9dfef332f1f34ea360"
        };

        const fbApp = initializeApp(firebaseConfig);
        const auth  = getAuth(fbApp);
        const db    = getFirestore(fbApp);

        let usuarioActual  = null;
        let nombreCompleto = "Turista";

        /* ── SESIÓN ── */
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioActual = user;
                try {
                    const snap = await getDoc(doc(db, "usuarios", user.uid));
                    if (snap.exists()) {
                        const d = snap.data();
                        nombreCompleto = ((d.nombre || '') + ' ' + (d.apellido || '')).trim();
                    }
                } catch(e) { console.warn("No se pudo leer perfil:", e); }
                cargarHistorial(user.uid);
            } else {
                alert("Debes iniciar sesión para explorar el catálogo.");
                window.location.href = "auth.html";
            }
        });

        /* ── SOLICITAR PROMO ──
           Genera código → guarda en codigos_venta (vendedor lo valida)
                         → guarda en visitas (historial del cliente)       */
        window.solicitarPromo = async function(idNegocio, nombreNegocio, promoTexto, icono) {
            if (!usuarioActual) { alert("Inicia sesión primero"); return; }

            const codigo = Math.random().toString(36).substring(2, 8).toUpperCase();

            document.getElementById('modal-negocio').innerText = nombreNegocio;
            document.getElementById('modal-codigo').innerText  = codigo;
            document.getElementById('cupon-modal').style.display = 'flex';

            try {
                // 1. Código para el vendedor
                await setDoc(doc(db, "codigos_venta", codigo), {
                    uid:       usuarioActual.uid,
                    nombre:    nombreCompleto,
                    negocioId: idNegocio,
                    negocio:   nombreNegocio,
                    ts:        serverTimestamp(),
                    usado:     false
                });

                // 2. Entrada en historial del cliente
                await addDoc(collection(db, "visitas"), {
                    id_cliente: usuarioActual.uid,
                    nombre:     nombreCompleto,
                    negocioId:  idNegocio,
                    negocio:    nombreNegocio,
                    promo:      promoTexto,
                    icono:      icono,
                    codigo:     codigo,
                    estado:     "pendiente",
                    fecha:      serverTimestamp()
                });

                // Refrescar historial
                cargarHistorial(usuarioActual.uid);

            } catch (e) {
                console.error("Error al generar código:", e);
                mostrarToast("Error al generar el código. Intenta de nuevo.");
            }
        };

        /* ── HISTORIAL ── */
        async function cargarHistorial(uid) {
            const listaEl = document.getElementById('lista-historial');
            listaEl.innerHTML = "<p style='text-align:center; color:var(--verde-salvia);'>Cargando...</p>";
            try {
                const q    = query(
                    collection(db, "visitas"),
                    where("id_cliente", "==", uid),
                    orderBy("fecha", "desc")
                );
                const snap = await getDocs(q);

                if (snap.empty) {
                    listaEl.innerHTML = "<p style='text-align:center; padding:20px;'>¡Aún no has canjeado ninguna promo! Explora el catálogo y presiona <strong>Canjear</strong>.</p>";
                    return;
                }

                listaEl.innerHTML = "";
                snap.forEach(function(docSnap) {
                    const v     = docSnap.data();
                    const fecha = (v.fecha && v.fecha.toDate)
                        ? v.fecha.toDate().toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
                        : "—";
                    const estado = v.estado || "pendiente";
                    const badge  = estado === "canjeado"
                        ? '<span style="color:var(--verde-salvia); font-weight:bold;">&#10003; Canjeado</span>'
                        : '<span style="color:var(--oliva-claro); font-weight:bold;">&#9203; Pendiente</span>';

                    listaEl.innerHTML +=
                        '<div class="visita-item">' +
                            '<div class="visita-icon">' + (v.icono || '🛍️') + '</div>' +
                            '<div class="visita-info">' +
                                '<h4>' + (v.negocio || 'Local') + '</h4>' +
                                '<p>' + (v.promo || '') + '</p>' +
                                '<p style="font-size:11px; margin-top:3px; color:#aaa;">' + fecha + '</p>' +
                            '</div>' +
                            '<div class="visita-pts">' + badge + '</div>' +
                        '</div>';
                });
            } catch (e) {
                console.error("Error historial:", e);
                listaEl.innerHTML = "<p style='text-align:center;'>No se pudo cargar el historial.</p>";
            }
        }

        /* ── CERRAR SESIÓN ── */
        window.cerrarSesion = function() {
            signOut(auth).then(function() { window.location.href = "auth.html"; });
        };
    </script>
</body>
</html>
