<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Negocios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #2f3640; color: white; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .dashboard-card { background: #353b48; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 10px; width: calc(100% - 24px); border-radius: 5px; border: none; margin-bottom: 10px; font-size: 16px; text-transform: uppercase;}
        .btn { background-color: #00a8ff; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-success { background-color: #4cd137; }
        #mensaje { margin-top: 10px; font-weight: bold; text-align: center; }
        .stats { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: #e1b12c; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center;">Mi Comercio Inteligente</h2>
        
        <div class="dashboard-card">
            <h3>Canjear Cupón</h3>
            <p>Ingresa el código que te muestra el turista:</p>
            <input type="text" id="input-codigo" placeholder="Ej. A1B2C" maxlength="5">
            <button class="btn" onclick="validarCupon()">Validar Venta</button>
            <div id="mensaje"></div>
        </div>

        <div class="dashboard-card">
            <h3>Tus Estadísticas</h3>
            <p>Ventas generadas por la red turística:</p>
            <div class="stats">
                <span>Total:</span>
                <span id="contador-ventas">0</span>
            </div>
        </div>
    </div>

    <script>
        // Cargar estadísticas al inicio
        let ventasTotales = parseInt(localStorage.getItem('ventasTotales')) || 0;
        document.getElementById('contador-ventas').innerText = ventasTotales;

        function validarCupon() {
            const codigo = document.getElementById('input-codigo').value.toUpperCase();
            let cuponesActivos = JSON.parse(localStorage.getItem('cupones')) || {};
            const mensajeDiv = document.getElementById('mensaje');

            if (cuponesActivos[codigo] && cuponesActivos[codigo].estado === 'pendiente') {
                // Marcar como usado
                cuponesActivos[codigo].estado = 'usado';
                localStorage.setItem('cupones', JSON.stringify(cuponesActivos));
                
                // Sumar estadística
                ventasTotales++;
                localStorage.setItem('ventasTotales', ventasTotales);
                document.getElementById('contador-ventas').innerText = ventasTotales;

                mensajeDiv.style.color = '#4cd137';
                mensajeDiv.innerText = `¡Cupón válido! Venta registrada exitosamente.`;
                document.getElementById('input-codigo').value = '';
            } else {
                mensajeDiv.style.color = '#e84118';
                mensajeDiv.innerText = 'Código inválido o ya fue utilizado.';
            }
        }
    </script>
</body>
</html>
